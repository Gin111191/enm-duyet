<!doctype html><!-- build: ads-manager-structure 2026-07-06c -->
<html lang="vi"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Êm Như Mây · Bảng điều khiển đăng bài</title>
<style>
:root{--bg:#FAF6F0;--card:#fff;--ink:#3b3430;--brown:#7a5c2e;--brown2:#b0836b;--muted:#8a7f74;--line:#e8ddcf;--surf:#fbf7f1;--warm:#f5ead7}
*{box-sizing:border-box}
html,body{overflow-x:hidden}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:56px;line-height:1.45;-webkit-text-size-adjust:100%}
h1,h2,.colh{font-family:'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif}
/* topbar (sticky as one unit — no fragile offsets) */
#topbar{position:sticky;top:0;z-index:20;background:var(--bg)}
header{background:#fffdf9;border-bottom:1px solid var(--line);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
header .ttl{font-weight:700;color:var(--brown);letter-spacing:.3px;font-size:16px}
header button{border:1px solid var(--line);background:var(--warm);color:var(--brown);border-radius:10px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;min-height:38px}
.sumbar{background:var(--surf);border-bottom:1px solid var(--line);padding:9px 12px;font-size:12.5px;color:var(--muted);display:flex;flex-wrap:wrap;gap:4px 14px;justify-content:center;align-items:center}
.sumbar .it{white-space:nowrap}
.sumbar b{color:var(--brown)}
.num{font-variant-numeric:tabular-nums;font-weight:700}
.tabs{display:flex;gap:6px;background:var(--bg);padding:8px 10px;border-bottom:1px solid var(--line)}
.tab{flex:1;border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:11px;padding:9px 4px;font-size:13.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;min-height:44px}
.tab.on{background:var(--brown);color:#fff;border-color:var(--brown)}
.tb{font-variant-numeric:tabular-nums;background:rgba(0,0,0,.12);border-radius:10px;padding:0 6px;font-size:11.5px;min-width:16px;text-align:center}
.tab.on .tb{background:rgba(255,255,255,.28)}
/* columns */
.cols{padding:10px}
.col{display:none}
.col.active{display:block}
.colh{font-size:16px;color:var(--brown);margin:2px 2px 10px;font-weight:700}
.colh small{font-family:-apple-system,sans-serif;font-weight:600;color:var(--muted);font-size:12px}
.sech{font-size:11.5px;font-weight:700;color:var(--muted);margin:14px 2px 6px;text-transform:uppercase;letter-spacing:.4px}
.empty{color:var(--muted);font-size:12.5px;padding:6px 2px}
/* card */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card.done{opacity:.5}
.meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.tm{font-weight:700;color:var(--ink);font-size:13.5px}
.fmt{font-weight:600}
.id{margin-left:auto;font-size:11px;color:#b8ac9d}
/* channel + status chips */
.chchip{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;color:#fff}
.chchip.ig{background:linear-gradient(45deg,#f09433,#dc2743,#bc1888)}
.chchip.fb{background:#1877f2}
.chchip.ads{background:#7a5c2e}
.sc{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap}
.sc-amber{background:#fbeccb;color:#8a5d0e}
.sc-green{background:#e3efe1;color:#3f7a49}
.sc-blue{background:#e2ecf8;color:#2b6cb0}
.sc-gray{background:#ececec;color:#7a7166}
.sc-teal{background:#d7efea;color:#2b7a72}
.sc-purple{background:#efe6f4;color:#7a4b8a}
.sc-red{background:#fdeaea;color:#b3392f}
/* thumbnails strip (IG / Ads) */
.imgs{display:flex;gap:6px;overflow-x:auto;margin:10px 0;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.imgs .th{flex:0 0 auto;position:relative;line-height:0}
.imgs img{width:96px;height:120px;object-fit:cover;border-radius:9px;border:1px solid var(--line);display:block}
.play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.7)}
.cap{white-space:pre-wrap;font-size:13.5px;line-height:1.45;max-height:112px;overflow:hidden;background:var(--surf);border:1px solid var(--line);border-radius:8px;padding:9px 10px;margin-top:8px}
.cap.open{max-height:none}
.more{color:var(--brown2);font-size:12.5px;background:none;border:none;padding:4px 0;cursor:pointer}
.fc{font-size:12px;color:var(--muted);margin-top:6px}
.note{background:var(--warm);border-radius:8px;padding:8px 10px;font-size:12.5px;margin-top:8px}
.note b{color:#b06a2a}
.err{background:#fdeaea;border-radius:8px;padding:8px 10px;font-size:12.5px;margin-top:8px;color:#a33}
.btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btns button{flex:1 1 auto;min-width:84px;border:none;border-radius:10px;padding:11px 0;font-size:13.5px;font-weight:700;cursor:pointer;min-height:44px}
.ok{background:#3d8b57;color:#fff}.no{background:#f0e4e0;color:#a33}.ed{background:#f5ead7;color:#7a5c2e}.back{background:#eee;color:#555}
#btnAll{width:100%;padding:12px;border-radius:12px;border:1px dashed #3d8b57;background:#eef7f0;color:#2c6b42;font-weight:700;margin:2px 0 8px;cursor:pointer;min-height:44px}
/* Planner FB */
.fbintro{background:var(--surf);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--muted);margin-bottom:12px}
.dayhdr{font-size:13px;font-weight:800;color:var(--brown);background:var(--warm);border:1px solid var(--line);border-left:4px solid var(--brown2);border-radius:8px;padding:8px 12px;margin:18px 2px 10px;letter-spacing:.2px}
.fbtop{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:8px}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.3px}
.b-post{background:#eaf3ea;color:#4b7a4e}.b-story{background:#f0e7f5;color:#7a4b8a}
.ftitle{font-size:13px;color:var(--muted);flex:1;min-width:100px}
.chk{margin-left:auto;font-size:12.5px;color:var(--muted);white-space:nowrap;cursor:pointer;user-select:none;display:flex;align-items:center;gap:5px}
.chk input{transform:scale(1.3);cursor:pointer}
.pimgs{display:flex;gap:9px;flex-wrap:wrap;margin:8px 0 2px}
.pimg{width:112px;border-radius:10px}
.pimg[draggable=true]{cursor:grab}
.pimg.drag{opacity:.45}
.pimg.drag .pph{outline:2px solid var(--brown2);box-shadow:0 6px 18px rgba(122,92,46,.35)}
.pimg.dragover .pph{outline:2px dashed var(--brown);outline-offset:2px}
.pimg .pph{border:1px solid var(--line);border-radius:9px;overflow:hidden;line-height:0;cursor:zoom-in;position:relative}
.pimg img{width:112px;height:140px;object-fit:cover;display:block}
.ord{position:absolute;top:4px;left:4px;background:rgba(122,92,46,.92);color:#fff;font-size:11px;font-weight:700;border-radius:6px;padding:1px 6px;font-variant-numeric:tabular-nums}
.pctl{display:flex;gap:4px;margin-top:5px}
.pctl button{flex:1;border:1px solid var(--line);background:#fff;color:var(--brown);border-radius:7px;padding:6px 0;font-size:13px;font-weight:700;cursor:pointer;min-height:38px}
.pctl button:disabled{opacity:.35;cursor:default}
.pctl .dl{flex:1.5}
.reord{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--muted);margin:6px 2px 0}
.reset{background:none;border:none;color:var(--brown2);font-size:11.5px;cursor:pointer;text-decoration:underline}
/* editor ảnh (sắp/xóa/thêm) */
.pimgs.saving{opacity:.55;pointer-events:none}
.delp{color:#b3392f}
.addp{flex:0 0 auto;width:112px;min-height:140px;border:1.5px dashed var(--brown2);background:var(--surf);color:var(--brown);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:12.5px;font-weight:700;cursor:pointer;line-height:1.2}
.addp span{font-size:26px;line-height:1}
.addp:disabled{opacity:.4;cursor:default}
/* mã bài (B11…) + nút hiện/ẩn bài đã đăng */
.bcode{font-family:ui-monospace,Menlo,monospace;font-weight:700;font-size:11.5px;color:#fff;background:var(--brown);border-radius:6px;padding:1px 7px;letter-spacing:.3px}
.pubtoggle{border:1px solid var(--line);background:var(--warm);color:var(--brown);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;cursor:pointer;margin-left:8px}
/* toolbar lọc/sắp/chế độ xem + thẻ gọn + nhãn trễ */
.tools{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin:2px 0 10px;padding:8px;background:var(--surf);border:1px solid var(--line);border-radius:10px}
.fchip{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:4px 10px;font-size:11.5px;font-weight:600;cursor:pointer;font-variant-numeric:tabular-nums}
.fchip.on{background:var(--brown);border-color:var(--brown);color:#fff}
.tspace{flex:1}
.tbtn{border:1px solid var(--line);background:var(--warm);color:var(--brown);border-radius:8px;padding:4px 10px;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap}
.card.mini{display:flex;align-items:center;gap:10px;padding:8px 10px}
.mthumb{position:relative;overflow:hidden;width:52px;height:52px;flex:0 0 auto;border-radius:8px;background-color:#efe7da;background-size:cover;background-position:center;border:1px solid var(--line)}
.minfo{flex:1;min-width:0}
.minfo>div{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.msub{font-size:11.5px;color:var(--muted);margin-top:3px}
.latebadge{font-size:10.5px;font-weight:800;color:#a33;background:#fdeaea;border-radius:6px;padding:2px 7px;white-space:nowrap}
/* badge yêu cầu sửa — THỐNG NHẤT 2 cột: đỏ (chờ sửa) / xanh (đã xử lý) */
.reqbadge{font-size:10.5px;font-weight:800;border-radius:6px;padding:2px 7px;white-space:nowrap}
.reqbadge.open{color:#c0392b;background:#fdeaea}
.reqbadge.done{color:#2c6b42;background:#e7f4ec}
/* khối "Yêu cầu sửa" trong popup: log lịch sử + form inline */
.reqbox{border-top:1px dashed var(--line);margin-top:12px;padding-top:10px}
.reqhd{font-size:12.5px;font-weight:800;color:var(--brown);margin-bottom:6px}
.requm{font-size:12px;color:var(--muted);margin-bottom:6px}
.reqitem{border-radius:9px;padding:8px 10px;margin-bottom:7px;font-size:12.5px}
.reqitem.open{background:#fdeaea;border:1px solid #f3cfca}
.reqitem.done{background:#eef7f0;border:1px solid #d3e8da}
.reqtxt{font-weight:600;line-height:1.4}
.reqmeta{font-size:10.5px;color:var(--muted);margin-top:3px}
.reqres{font-size:12px;color:#2c6b42;margin-top:4px;padding-left:4px}
.reqta{width:100%;box-sizing:border-box;min-height:64px;border:1px solid #d9c9b8;border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;resize:vertical}
.reqbtns{display:flex;gap:7px;margin-top:6px}
.reqbtns button{border:none;border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:700;cursor:pointer;min-height:0}
.mini-edit{border:none;background:#f2e7d6;color:#7a5c2e;border-radius:7px;padding:5px 10px;font-size:11.5px;font-weight:700;cursor:pointer;margin-top:5px}
.mini-del{border:none;background:#f7dedb;color:#a3352b;border-radius:7px;padding:5px 10px;font-size:11.5px;font-weight:700;cursor:pointer;margin-top:5px;margin-left:6px}
.reqadd{width:100%;border:1px dashed #c9a24b;background:#fffaf3;color:#8a6a1e;border-radius:9px;padding:9px;font-size:12.5px;font-weight:700;cursor:pointer}
/* preview WYSIWYG: hiển thị giống layout thật FB/IG để duyệt */
.fv{margin:10px 0 4px}
.fvlab{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600}
/* Collage FB — tỉ lệ ĐO TỪ 14 SCREENSHOT FB THẬT 4/7/2026 (desktop):
   khung 2–4 ảnh = 1:1 · khung 5+ = 6:5 · ô lớn trái/trên = 2:3 hoặc 3:2 · ô nhỏ = vuông ·
   2 dọc = 2 cột · 2 ngang = 2 hàng · 5+ = 2 ô vuông trên + 3 ô vuông dưới (+N) */
.collage{display:grid;gap:3px;border-radius:11px;overflow:hidden;border:1px solid var(--line);max-width:360px;background:#eee;aspect-ratio:1/1}
.collage .c{background-size:cover;background-position:center;background-color:#efe7da;position:relative;min-height:0;cursor:zoom-in}
.collage.n1{grid-template-columns:1fr;aspect-ratio:4/5}/* 1 ảnh: aspect thật set bằng JS (measureCollages) */
.collage.n2{grid-template-columns:1fr 1fr}
.collage.n2.land{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
.collage.n3{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr}
.collage.n3 .c:first-child{grid-row:1/3}
.collage.n3.land{grid-template-columns:1fr 1fr;grid-template-rows:2fr 1fr}
.collage.n3.land .c:first-child{grid-row:1;grid-column:1/3}
.collage.n4{grid-template-columns:2fr 1fr;grid-template-rows:repeat(3,1fr)}
.collage.n4 .c:first-child{grid-row:1/4}
.collage.n4.land{grid-template-columns:repeat(3,1fr);grid-template-rows:2fr 1fr}
.collage.n4.land .c:first-child{grid-row:1;grid-column:1/4}
.collage.n4.sq{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.collage.n4.sq .c:first-child{grid-row:auto;grid-column:auto}
.collage.n5{aspect-ratio:6/5;grid-template-columns:repeat(6,1fr);grid-template-rows:3fr 2fr}
.collage.n5 .c:nth-child(-n+2){grid-column:span 3}
.collage.n5 .c:nth-child(n+3){grid-column:span 2}
.collage .more{position:absolute;inset:0;background:rgba(30,20,12,.5);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
.igcover{max-width:300px;border-radius:11px;overflow:hidden;border:1px solid var(--line)}
.igcover .cv{aspect-ratio:4/5;background-size:cover;background-position:center;background-color:#efe7da;cursor:zoom-in;position:relative}
.igcover .multi{position:absolute;top:8px;right:8px;color:#fff;font-size:15px;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.dots{display:flex;gap:5px;justify-content:center;padding:7px 0;background:#fff}
.dots i{width:6px;height:6px;border-radius:50%;background:#d8cbb8;display:block}
.dots i.on{background:var(--brown)}
/* thẻ bài đăng thật (chrome IG/FB) */
.pcard{max-width:380px;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#fff}
.phdr{display:flex;align-items:center;gap:9px;padding:9px 11px}
.pav{width:31px;height:31px;border-radius:50%;flex:0 0 auto;background:linear-gradient(135deg,#f3dde0,#e8d3a8);border:1px solid var(--line)}
.pnm{font-weight:700;font-size:13px;color:var(--ink);line-height:1.1}
.ptime{font-size:11px;color:var(--muted);display:flex;gap:4px}
.phdr .pmore{margin-left:auto;color:var(--muted);font-weight:700;font-size:16px}
.pcaptop{padding:0 12px 9px;font-size:13.5px;white-space:pre-wrap;max-height:66px;overflow:hidden;color:var(--ink)}
.pcard .igcover,.pcard .collage{max-width:none;border-radius:0;border-left:none;border-right:none}
.pcard .collage{border-left:none;border-right:none;border-top:1px solid var(--line)}
.pacts{display:flex;gap:15px;padding:9px 12px 3px;font-size:19px;color:var(--ink)}
.pacts .save{margin-left:auto}
.pcap{padding:1px 12px 11px;font-size:13px;line-height:1.45;white-space:pre-wrap;max-height:60px;overflow:hidden}
.pcap b{font-weight:700}
.pbar{display:flex;border-top:1px solid var(--line);margin-top:3px}
.pbar span{flex:1;text-align:center;padding:9px 0;font-size:12.5px;color:var(--muted);font-weight:600}
.frow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
.copy{background:var(--brown);color:#fff;border:0;border-radius:8px;padding:9px 14px;font-size:13.5px;font-weight:600;cursor:pointer;min-height:40px}
.copy.done{background:#4b7a4e}
.sub{font-size:12px;color:var(--muted)}
.cmt{border-top:1px dashed var(--line);margin-top:10px;padding-top:10px}
.cmt .lbl{font-size:12px;font-weight:700;color:var(--brown);margin-bottom:5px}
/* Ads */
.adsnote{background:var(--warm);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;margin-bottom:10px}
.adslink{margin:0 2px 12px;font-size:12.5px}
.explain{color:var(--brown);font-weight:600}
.muted{color:var(--muted)}
/* gate */
#gate{max-width:320px;margin:70px auto;text-align:center;padding:0 16px}
#gate p{color:var(--brown)}
#gate input{font-size:26px;letter-spacing:8px;text-align:center;width:200px;padding:10px;border:1px solid #d8c9b8;border-radius:12px}
#gate button{margin-top:14px;padding:12px 30px;border-radius:12px;border:none;background:var(--brown2);color:#fff;font-weight:700;cursor:pointer}
/* lightbox */
#lb{position:fixed;inset:0;background:rgba(25,18,12,.94);display:none;z-index:60;align-items:center;justify-content:center;flex-direction:column}
#lb.on{display:flex}
#lb img{max-width:94vw;max-height:82vh;border-radius:10px;box-shadow:0 6px 40px rgba(0,0,0,.5)}
#lb video{max-width:94vw;max-height:82vh;border-radius:10px;box-shadow:0 6px 40px rgba(0,0,0,.5);background:#000}
/* preview Reel (video) trong popup — khung 9:16 như IG/FB thật */
.reelcov{position:relative;width:100%;max-width:240px;aspect-ratio:9/16;margin:0 auto;background-color:#111;background-size:cover;background-position:center;border-radius:6px;cursor:pointer}
.reelcov .playbig{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.65)}
/* Ads kiểu Ads Manager: chiến dịch → nhóm QC → bài ads */
.cinfo{background:var(--warm);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:10px 0;font-size:13px}
.cinfo .row{margin:3px 0}
.cinfo .lbl{font-weight:800;color:var(--brown);margin-right:4px}
.cinfo ul{margin:6px 0 0;padding-left:18px}
.cinfo li{font-size:12.5px;margin:2px 0}
.adset{border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;margin:12px 0;background:var(--white)}
.adset>h4{margin:0 0 6px;font-size:14px;color:var(--brown)}
.adprop{font-size:12.5px;color:var(--brown2);margin:2px 0}
.adprop b{color:var(--brown)}
.adrow{display:flex;gap:10px;align-items:flex-start;background:var(--warm);border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin:7px 0}
.adrow .athumb{position:relative;overflow:hidden;width:46px;height:60px;flex:0 0 auto;border-radius:7px;background-color:#efe7da;background-size:cover;background-position:center;cursor:pointer}
.adrow .athumb .play{font-size:14px}
.adrow .ainfo{flex:1;min-width:0;font-size:12.5px}
.adrow .ainfo .anm{font-weight:800;color:var(--brown);font-size:13px}
.adrow .ainfo .adesc{margin:2px 0;color:var(--ink)}
.adrow .ainfo .atag{display:inline-block;font-size:11px;font-weight:700;color:var(--brown2);background:#fff;border:1px solid var(--line);border-radius:99px;padding:1px 8px;margin:2px 4px 0 0}
/* đổi ngày giờ đăng */
.schedrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0;padding:9px 11px;background:var(--warm);border:1px solid var(--line);border-radius:10px;font-size:13px}
.schedrow .lbl{font-weight:800;color:var(--brown)}
.schedrow input[type=datetime-local]{border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:13px;color:var(--brown);background:#fff;min-height:34px}
.schedrow .sub{font-size:11.5px;color:var(--brown2);flex-basis:100%}

<script>
var API = 'https://hxucribafqcxsybovgmc.supabase.co/functions/v1/autopub-review';
var PIN = sessionStorage.getItem('enm_pin') || '';
var DATA = {posts:[], ads:[], now:null};
/* CEO: dán link "trang giải thích Ads" vào đây khi có (để trống = hiện dòng nhắc). */
var ADS_EXPLAIN_URL = '';

var FMT = {photo:'Ảnh', multi_photo:'Nhiều ảnh', reel:'Reel', story:'Story'};
var STC = {
  pending:{c:'amber', t:'⏳ chờ duyệt'},
  approved:{c:'green', t:'✅ đã duyệt · chờ giờ'},
  publishing:{c:'blue', t:'🚀 đang đăng'},
  published:{c:'blue', t:'📤 đã đăng'},
  fb_scheduled:{c:'teal', t:'🕒 đã vào lịch Meta'},
  needs_edit:{c:'purple', t:'✏️ chờ sửa'},
  rejected:{c:'gray', t:'❌ đã bỏ'},
  failed:{c:'red', t:'⚠️ lỗi'},
  created_paused:{c:'amber', t:'💤 nháp TẮT đã dựng'},
  activated_by_owner:{c:'green', t:'▶️ Gin đã bật'}
};

/* tick "đã lên lịch" FB nay lưu DB (autopub_posts.owner_scheduled) → ĐỒNG BỘ mọi máy.
   localStorage chỉ còn để DI TRÚ 1 lần tick cũ (enm-fb-done) lên DB (xem migrateFbDone). */
function load(k){ try{ return JSON.parse(localStorage.getItem(k)||'{}'); }catch(e){ return {}; } }
function store(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function fbDone(p){ return !!(p && p.owner_scheduled); }

/* ---- helpers ---- */
function api(body){ body.pin = PIN;
  return fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){ return r.json().then(function(j){ j._s = r.status; return j; }); }); }
function esc(s){ var d=document.createElement('div'); d.textContent = s==null?'':String(s); return d.innerHTML; }
function money(n){ return (Number(n)||0).toLocaleString('vi-VN')+'đ'; }
function fmtTime(iso){ if(!iso) return '—'; var d=new Date(iso);
  return d.toLocaleString('vi-VN',{timeZone:'Asia/Ho_Chi_Minh',weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function timeHM(iso){ if(!iso) return ''; return new Date(iso).toLocaleTimeString('vi-VN',{timeZone:'Asia/Ho_Chi_Minh',hour:'2-digit',minute:'2-digit'}); }
function dayLabel(iso){ if(!iso) return 'Chưa hẹn giờ'; var s=new Date(iso).toLocaleDateString('vi-VN',{timeZone:'Asia/Ho_Chi_Minh',weekday:'long',day:'2-digit',month:'2-digit'});
  return s.charAt(0).toUpperCase()+s.slice(1); }
function byTime(a,b){ return new Date(a.scheduled_at||0) - new Date(b.scheduled_at||0); }
function chip(status){ var s=STC[status]||{c:'gray',t:status}; return '<span class="sc sc-'+s.c+'">'+esc(s.t)+'</span>'; }
/* nhãn theo KÊNH: bài FB status 'rejected' = "park" để máy KHÔNG tự đăng (Gin đăng tay) → hiện "chưa lên lịch", KHÔNG phải "đã bỏ". IG vẫn "đã bỏ". */
function statusLabel(ch,status){ if(ch==='fb'&&status==='rejected') return {c:'amber',t:'📋 chưa lên lịch'}; return STC[status]||{c:'gray',t:status}; }
function chip2(ch,status){ var s=statusLabel(ch,status); return '<span class="sc sc-'+s.c+'">'+esc(s.t)+'</span>'; }
/* FB: trạng thái suy TỪ owner_scheduled + giờ hẹn + published (KHÔNG dùng cột status thô = luôn 'rejected'/'park').
   Sửa bug: bài đã tick "đã lên lịch" trước đây vẫn hiện "chưa lên lịch"/"trễ" vì thẻ đọc status. */
function fbState(p){ if(p.status==='published') return 'published'; if(p.owner_discarded) return 'discarded'; if(fbDone(p)) return isLate(p)?'sched_past':'sched_wait'; return 'unscheduled'; }
var FBSTATE = {
  unscheduled:{c:'amber', t:'📋 chưa lên lịch'},
  sched_wait: {c:'teal',  t:'🗓 đã lên lịch'},
  sched_past: {c:'green', t:'✅ đã lên lịch · qua giờ'},
  published:  {c:'blue',  t:'📤 đã đăng'},
  discarded:  {c:'gray',  t:'🗑 đã bỏ'}
};
/* nhãn cho THẺ GỌN: FB theo fbState; IG theo status (ẩn chip needs_edit → để badge đỏ thể hiện, tránh trùng). */
function cardChip(p){ if(p.channel==='fb'){ var s=FBSTATE[fbState(p)]; return '<span class="sc sc-'+s.c+'">'+esc(s.t)+'</span>'; }
  if(p.status==='needs_edit') return ''; return chip(p.status); }
/* cờ "trễ" (gộp 2 cột): quá giờ · chưa đăng · không phải bài đã bỏ */
function cardLate(p){ return isLate(p) && p.status!=='published' && !(p.channel==='fb' && p.owner_discarded); }

/* ===== Yêu cầu sửa (THỐNG NHẤT IG/FB/Ads) — lưu ở edit_log (jsonb mảng) ===== */
function editLog(o){ return Array.isArray(o && o.edit_log) ? o.edit_log : []; }
function editState(o){ var L=editLog(o); if(!L.length) return 'none';
  return L.some(function(e){ return !e.done; }) ? 'open' : 'done'; }
/* badge đỏ (còn yêu cầu mở) / xanh (đã xử lý hết) — dùng chung mọi cột */
function editBadge(o){ var s=editState(o);
  if(s==='open') return ' <span class="reqbadge open">✏️ Chờ sửa</span>';
  if(s==='done') return ' <span class="reqbadge done">✅ Đã xử lý</span>';
  return ''; }

/* 4 MỤC CHUNG (Gin chốt thứ tự) — dùng cho CẢ IG lẫn FB */
function postBucket(p){
  if(p.status==='published') return 4;
  if(editState(p)==='open') return 3;                       // CÒN yêu cầu sửa mở → "Đang sửa"
  if(p.channel==='fb'){
    if(p.owner_discarded) return 3;                         // đã bỏ
    if(fbDone(p)) return isLate(p) ? 4 : 2;                 // đã lên lịch: QUA GIỜ → "Đã đăng" (Gin đăng tay) · chưa tới giờ → "Sắp lên"
    return 1;                                               // chưa lên lịch
  }
  if(['failed','rejected'].indexOf(p.status)>=0) return 3;  // lỗi/đã bỏ (needs_edit ĐÃ xử lý xong rơi xuống mục 1 chờ Duyệt lại)
  if(['approved','publishing'].indexOf(p.status)>=0) return 2;
  return 1;                                                 // pending · needs_edit-đã-xử-lý (badge "Đã xử lý", chờ Gin Duyệt)
}
function bucketLabel(n){ return ['','⏳ Chờ duyệt · lên lịch','🕒 Sắp lên · đã duyệt','⚠️ Lỗi · Đang sửa · Đã bỏ','📤 Đã đăng'][n]; }
/* render danh sách, chèn tiêu đề NGÀY (highlight) mỗi khi đổi ngày — dùng chung IG/FB/Ads. dateOf: hàm lấy mốc ngày (mặc định scheduled_at; ads truyền created_at) */
function byDayCards(list, cardFn, dateOf){ var h='', cur=''; list.forEach(function(p){ var d=dayLabel(dateOf?dateOf(p):p.scheduled_at); if(d!==cur){ cur=d; h+='<div class="dayhdr">📅 '+esc(d)+'</div>'; } h+=cardFn(p); }); return h; }
function post(id){ id=+id; for(var i=0;i<DATA.posts.length;i++) if(DATA.posts[i].id===id) return DATA.posts[i]; return null; }

/* clipboard với fallback execCommand (máy Gin trên HTTPS vẫn ưu tiên navigator.clipboard) */
function copyText(txt, btn){
  var ok=function(){ var o=btn.textContent; btn.textContent='✓ Đã copy'; btn.classList.add('done');
    setTimeout(function(){ btn.textContent=o; btn.classList.remove('done'); },1400); };
  if(navigator.clipboard && window.isSecureContext){ navigator.clipboard.writeText(txt).then(ok).catch(function(){ fallbackCopy(txt,ok); }); }
  else fallbackCopy(txt,ok);
}
function fallbackCopy(txt,ok){
  var ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); ok(); }catch(e){ alert('Không copy tự động được — bôi đen tay giúp nhé.'); }
  document.body.removeChild(ta);
}
/* tải 1 ảnh: fetch→blob→link tải (fallback mở tab mới) */
function fname(u){ return decodeURIComponent(u.split('/').pop().split('?')[0]); }
function dl(url){ var name=fname(url);
  fetch(url).then(function(r){ if(!r.ok) throw 0; return r.blob(); }).then(function(b){
    var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name;
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){ URL.revokeObjectURL(a.href); },4000);
  }).catch(function(){ window.open(url,'_blank'); }); }

/* ---- lightbox (ảnh + VIDEO: url .mp4/.mov → thẻ <video> tự phát) ---- */
var LBSETS={}, LBLIST=[], LBIDX=0;
function isVidUrl(u){ return /\.(mp4|mov|m4v|webm)(\?|$)/i.test(u||''); }
function lbStopVid(){ var v=document.getElementById('lbvid'); try{ v.pause(); }catch(e){} v.removeAttribute('src'); try{ v.load(); }catch(e){} v.style.display='none'; }
function lbShow(){ var u=LBLIST[LBIDX]||'', im=document.getElementById('lbimg'), v=document.getElementById('lbvid');
  if(isVidUrl(u)){ im.style.display='none'; im.src=''; v.style.display=''; v.src=u; try{ v.play().catch(function(){}); }catch(e){} }
  else { lbStopVid(); im.style.display=''; im.src=u; } }
function openLB(key, idx){ LBLIST=LBSETS[key]||[]; LBIDX=idx; lbShow(); document.getElementById('lb').classList.add('on'); }
function closeLB(){ lbStopVid(); document.getElementById('lb').classList.remove('on'); document.getElementById('lbimg').src=''; }
function stepLB(d){ if(!LBLIST.length) return; LBIDX=(LBIDX+d+LBLIST.length)%LBLIST.length; lbShow(); }
function dlLB(){ if(LBLIST[LBIDX]) dl(LBLIST[LBIDX]); }

/* ---- popup chi tiết bài (modal) — thẻ gọn click mở ra, đủ chức năng ---- */
var DETAIL=null;   // {ch,id} bài đang mở, null = đóng
function adById(id){ id=+id; for(var i=0;i<DATA.ads.length;i++) if(DATA.ads[i].id===id) return DATA.ads[i]; return null; }
function openDetail(ch,id){ DETAIL={ch:ch,id:+id}; renderDetail(); document.getElementById('detail').classList.add('on'); document.body.style.overflow='hidden'; }
function closeDetail(){ DETAIL=null; document.getElementById('detail').classList.remove('on'); document.getElementById('detailBody').innerHTML=''; document.body.style.overflow=''; }
function renderDetail(){
  if(!DETAIL) return;
  var body=document.getElementById('detailBody'), html='', t='';
  if(DETAIL.ch==='ads'){ var a=adById(DETAIL.id); if(!a){ closeDetail(); return; } html=adDetail(a); t=a.name||('#'+a.id); }
  else { var p=post(DETAIL.id); if(!p){ closeDetail(); return; } html=(p.channel==='ig'?igDetail(p):fbDetail(p)); t=p.batch||('#'+p.id); }
  document.getElementById('dtitle').textContent=t; body.innerHTML=html; measureCollages();
}

/* ---- gate / decide ---- */
function enter(){ PIN=document.getElementById('pin').value.trim(); refresh(); }
function decide(kind, id, dec){
  var note='';
  if(dec==='needs_edit'){ note=prompt('Muốn sửa gì? Ghi rõ để đội làm đúng:'); if(note==null||!note.trim()) return; }
  if(dec==='rejected' && !confirm('Bỏ mục này?')) return;
  api({action:'decide',kind:kind,id:id,decision:dec,note:note}).then(function(j){ if(j.error) alert('Lỗi: '+j.error); refresh(); });
}
function approveAll(){ if(!confirm('Duyệt TẤT CẢ mục đang chờ? Sau bước này máy sẽ tự đăng đúng giờ.')) return;
  api({action:'approve_all'}).then(function(j){ if(j.error) alert('Lỗi: '+j.error); refresh(); }); }
function toggleCap(btn){ var c=btn.previousElementSibling; c.classList.toggle('open');
  btn.textContent = c.classList.contains('open') ? 'thu gọn ▴' : 'xem hết ▾'; }
/* đổi tick "đã lên lịch" FB (dùng chung: checkbox trong popup + nút nhanh trên thẻ) */
function setSched(id, val){ var p=post(id); if(!p) return;
  p.owner_scheduled=val; renderFB(); renderSummary();
  api({action:'set_scheduled', ids:[id], value:val}).then(function(j){
    if(j.error){ p.owner_scheduled=!val; renderFB(); renderSummary(); alert('Lỗi lưu lịch: '+(j.error||'')); }
  }); }
/* ===== Yêu cầu sửa: form INLINE trong bài + log lịch sử (thay prompt cũ) ===== */
var REQEDIT=null;   // '<kind>:<id>:add' hoặc '<kind>:<id>:<index>' đang mở textarea
function objFor(kind,id){ return kind==='ad'?adById(id):post(id); }
function reRenderAll(kind){ if(kind==='ad') renderAds(); else { renderIG(); renderFB(); } renderSummary(); } // render tự gọi renderDetail nếu popup mở
function focusReq(){ var t=document.getElementById('reqta'); if(t){ t.focus(); try{ t.selectionStart=t.value.length; }catch(e){} } }
function reqOpenAdd(kind,id){ REQEDIT=kind+':'+id+':add'; renderDetail(); focusReq(); }
function reqOpenEdit(kind,id,i){ REQEDIT=kind+':'+id+':'+i; renderDetail(); focusReq(); }
function reqCancel(){ REQEDIT=null; renderDetail(); }
function reqDelete(kind,id,i){    // xoá 1 yêu cầu CHƯA xử lý
  if(!confirm('Xoá yêu cầu sửa này?')) return;
  var o=objFor(kind,id); if(!o) return;
  var L=editLog(o); if(!L[i]||L[i].done) return;
  var prev=o.edit_log; L=L.slice(); L.splice(i,1); o.edit_log=L; REQEDIT=null; reRenderAll(kind);
  api({action:'edit_request', kind:kind, id:id, op:'delete', index:i}).then(function(j){
    if(j.error){ o.edit_log=prev; reRenderAll(kind); alert('Lỗi xoá yêu cầu: '+(j.error||'')); }
  }); }
/* nút "Sửa" trên thẻ/hành động → mở popup bài + form thêm yêu cầu (không còn prompt tách rời) */
function suaCard(kind,id){ var ch = kind==='ad' ? 'ads' : ((post(id)||{}).channel||'ig'); openDetail(ch,id); reqOpenAdd(kind,id); }
function reqSave(kind,id,i){        // i<0 = thêm mới; i>=0 = sửa lại entry (chỉ khi chưa done)
  var ta=document.getElementById('reqta'); if(!ta) return;
  var text=ta.value.trim();
  if(!text){ REQEDIT=null; renderDetail(); return; }              // rỗng = huỷ
  var o=objFor(kind,id); if(!o) return;
  var prevLog=o.edit_log, prevStatus=o.status, L=editLog(o).slice();
  if(i<0){ L.push({at:new Date().toISOString(), text:text, done:false, resolution:null, done_at:null});
    if(['pending','approved','publishing'].indexOf(o.status)>=0) o.status='needs_edit'; }  // IG/Ads: tạm dừng auto-đăng
  else { if(!L[i]||L[i].done){ REQEDIT=null; renderDetail(); return; } L[i]={at:L[i].at, text:text, done:false, resolution:null, done_at:null}; }
  o.edit_log=L; REQEDIT=null; reRenderAll(kind);
  api({action:'edit_request', kind:kind, id:id, op:(i<0?'add':'update'), index:(i<0?-1:i), text:text}).then(function(j){
    if(j.error){ o.edit_log=prevLog; o.status=prevStatus; reRenderAll(kind); alert('Lỗi lưu yêu cầu: '+(j.error||'')); }
  }); }
/* khối "Yêu cầu sửa" trong popup (log lịch sử + form inline) — dùng cho igDetail/fbDetail/adDetail */
function editReqBlock(kind, o){
  var L=editLog(o), key=kind+':'+o.id;
  var h='<div class="reqbox"><div class="reqhd">🛠 Yêu cầu sửa'+(L.length?' ('+L.length+')':'')+'</div>';
  if(!L.length && REQEDIT!==key+':add') h+='<div class="requm">Chưa có yêu cầu nào. Bấm ➕ để tạo.</div>';
  L.forEach(function(e,i){

/* Bỏ FB: ẩn bài (owner_discarded) — khôi phục được. Cờ cá nhân, KHÔNG đụng status/runner. */
function setDiscarded(id, val){ var p=post(id); if(!p) return;
  if(val && !confirm('Bỏ bài FB này? (khôi phục được)')) return;
  p.owner_discarded=val; renderFB(); renderSummary();
  api({action:'set_discarded', ids:[id], value:val}).then(function(j){
    if(j.error){ p.owner_discarded=!val; renderFB(); renderSummary(); alert('Lỗi lưu Bỏ/Khôi phục: '+(j.error||'')); }
  }); }
/* hàng nút hành động trên thẻ gọn (bấm KHÔNG mở popup — .qacts stopPropagation).
   IG/Ads = đủ bộ theo trạng thái (pending → Duyệt/Sửa/Bỏ) qua btnsHtml.
   FB = Lên/Bỏ lịch (máy không đăng FB) + ✏️ Sửa (ghi chú) + 🗑 Bỏ; bài đã bỏ → chỉ Khôi phục. */
function actRow(p){
  var inner='';
  if(p.channel==='fb'){
    if(p.status==='published') return '';
    if(p.owner_discarded){
      inner='<div class="btns"><button class="back" onclick="setDiscarded('+p.id+',false)">↩︎ Khôi phục</button></div>';
    } else {
      inner='<div class="btns">'+(fbDone(p)
        ? '<button class="back" onclick="setSched('+p.id+',false)">Bỏ lịch</button>'
        : '<button class="ok" onclick="setSched('+p.id+',true)">Lên lịch</button>')
        + '<button class="ed" onclick="suaCard(\'post\','+p.id+')" title="Yêu cầu sửa">✏️</button>'
        + '<button class="no" onclick="setDiscarded('+p.id+',true)" title="Bỏ bài">🗑</button>'
        + '</div>';
    }
  } else {
    inner=btnsHtml('post', p, true);   // nhãn NGẮN cho thẻ gọn (popup vẫn nhãn đầy đủ)
  }
  return inner ? '<div class="qacts" onclick="event.stopPropagation()">'+inner+'</div>' : '';
}

/* nút hành động cho IG / Ads (giữ đúng luồng trạng thái trang cũ) */
function btnsHtml(kind, p, compact){ var s=p.status, h='<div class="btns">';
  function bt(cls,dec,full,short){ return '<button class="'+cls+'" onclick="decide(\''+kind+'\','+p.id+',\''+dec+'\')">'+(compact?short:full)+'</button>'; }
  var sua='<button class="ed" onclick="suaCard(\''+kind+'\','+p.id+')">'+(compact?'Sửa':'✏️ Sửa')+'</button>';
  if(s==='pending') h+=bt('ok','approved','✅ Duyệt','Duyệt')+sua+bt('no','rejected','❌ Bỏ','Bỏ');
  else if(s==='needs_edit') h+=bt('ok','approved','✅ Duyệt','Duyệt')+sua+bt('no','rejected','❌ Bỏ','Bỏ');
  else if(s==='approved') h+=bt('back','pending','↩︎ Rút','Rút')+sua+bt('no','rejected','❌ Bỏ','Bỏ');
  else if(s==='fb_scheduled') h+=bt('no','rejected','❌ Hủy đăng (gỡ khỏi lịch)','Hủy');
  else if(s==='failed') h+=bt('ok','approved','🔁 Thử lại','Thử lại')+sua+bt('no','rejected','❌ Bỏ','Bỏ');
  else if(s==='rejected') h+=bt('back','pending','↩︎ Khôi phục về chờ duyệt','Khôi phục');
  else if(s==='created_paused' && kind==='ad') h+=bt('ok','activated_by_owner','▶️ Tôi đã bật tay','Đã bật')+sua+bt('no','rejected','❌ Bỏ','Bỏ');

function saveTime(id){

}

/* đo ảnh đầu (đúng cơ chế FB/IG thật):
   FB collage: NGANG → biến thể .land (1 lớn trên / 2 hàng) · VUÔNG → .sq (2×2 khi n4) · 1 ảnh → khung = tỉ lệ thật
   IG cover: khung = tỉ lệ ảnh đầu kẹp [4:5 … 1.91:1] (ảnh đầu ép cả carousel) */
function measureCollages(){
  var els=document.querySelectorAll('.collage[data-first], .igcover .cv[data-first]');
  for(var i=0;i<els.length;i++){ (function(el){
    var u=el.getAttribute('data-first'); if(!u) return;
    var im=new Image();
    im.onload=function(){
      var r=im.naturalWidth/im.naturalHeight;
      if(el.classList.contains('cv')){ el.style.aspectRatio=String(Math.min(Math.max(r,0.8),1.91)); return; }
      if(el.classList.contains('n1')){ el.style.aspectRatio=String(Math.min(Math.max(r,0.66),1.91)); return; }
      if(r>1.05) el.classList.add('land');
      else if(r>0.95 && el.classList.contains('n4')) el.classList.add('sq');
    };
    im.src=u;
  })(els[i]); }
}

/* áp mảng ảnh mới (sắp/xóa): optimistic + khóa + lưu DB (chống ghi-đè-cũ bằng expected_updated_at) */
function applyMedia(id, newMedia){
  if(SAVING[id]) return;
  var p=post(id); if(!p) return;
  if(newMedia.length<1){ alert('Phải còn ít nhất 1 ảnh.'); return; }
  UNDO[id]=(p.media||[]).slice();
  var expected=p.updated_at;
  p.media=newMedia; p.format=(newMedia.length===1?'photo':'multi_photo');
  SAVING[id]=true; reRenderFor(p);
  setMedia(id, newMedia, expected).then(function(j){
    SAVING[id]=false;
    if(!j || j.error){
      delete UNDO[id];
      alert('Không lưu được: '+(j&&j.error==='stale' ? 'bài vừa đổi ở nơi khác — đã tải lại' : (j&&j.error)||'lỗi mạng'));
      refresh(); return;
    }
    if(j.updated_at) p.updated_at=j.updated_at;
    reRenderFor(p);
    setTimeout(function(){ if(UNDO[id]){ delete UNDO[id]; var pp=post(id); if(pp) reRenderFor(pp);} }, 7000);
  });
}
function moveMedia(id, i, dir){
  var p=post(id); if(!p||SAVING[id]) return;
  var media=(p.media||[]).slice(); var j=i+dir;
  if(j<0||j>=media.length) return;
  var t=media[i]; media[i]=media[j]; media[j]=t;
  applyMedia(id, media);
}
function deletePhoto(id, i){
  var p=post(id); if(!p||SAVING[id]) return;
  var media=(p.media||[]);
  if(media.length<=1){ alert('Không xóa được ảnh cuối — bài phải còn ít nhất 1 ảnh.'); return; }
  if(!confirm('Xóa ảnh này khỏi bài?')) return;
  var nm=media.slice(); nm.splice(i,1);
  applyMedia(id, nm);
}
function doUndo(id){
  if(SAVING[id] || !UNDO[id]) return;
  var prev=UNDO[id]; delete UNDO[id];
  applyMedia(id, prev);
}
function startAdd(id){ if(SAVING[id]) return; ADD_TARGET=id; document.getElementById('addfile').click(); }
function onAddFile(input){
  var f = input.files && input.files[0];
  input.value='';
  if(!f || ADD_TARGET==null) return;
  var id=ADD_TARGET; ADD_TARGET=null;
  var p=post(id); if(!p || SAVING[id]) return;
  SAVING[id]=true; reRenderFor(p);
  prepImage(f).then(function(b64){
    return addMediaApi(id, b64, p.updated_at);
  }).then(function(j){
    SAVING[id]=false;
    if(!j || j.error){
      alert('Không thêm được ảnh: '+(j&&j.error==='stale' ? 'bài vừa đổi — đã tải lại' : (j&&j.error)||'lỗi mạng'));
      refresh(); return;
    }
    refresh();   // tải lại: có ảnh mới + thứ tự + updated_at (xử đúng cả trùng ảnh)
  }).catch(function(e){
    SAVING[id]=false;
    var pp=post(id); if(pp) reRenderFor(pp);
    alert(e && e.message ? e.message : 'Ảnh không đọc được (HEIC?) — chọn ảnh JPEG.');
  });
}

/* nén + xoay đúng EXIF → JPEG base64 (chặn ảnh trống HEIC, không upload ảnh hỏng) */
function prepImage(file){
  return new Promise(function(resolve, reject){
    function draw(src, w, h){
      if(!w || !h){ reject(new Error('Ảnh không đọc được (HEIC?) — chọn ảnh JPEG.')); return; }
      var max=2048, sc=Math.min(1, max/Math.max(w,h));   // giữ ảnh sắc (FB tới 2048; IG lấy nguồn tốt hơn)
      var cw=Math.max(1,Math.round(w*sc)), ch=Math.max(1,Math.round(h*sc));
      var cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
      var ctx=cv.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,cw,ch);
      try{ ctx.drawImage(src,0,0,cw,ch); }catch(e){ reject(new Error('Ảnh không vẽ được — chọn ảnh JPEG.')); return; }
      var durl;
      try{ durl=cv.toDataURL('image/jpeg',0.92); }catch(e){ reject(new Error('Ảnh lỗi khi nén.')); return; }
      if(!durl || durl.length<200){ reject(new Error('Ảnh không đọc được — chọn ảnh JPEG.')); return; }
      resolve(durl);
    }
    if(window.createImageBitmap){
      createImageBitmap(file, {imageOrientation:'from-image'}).then(function(bmp){
        draw(bmp, bmp.width, bmp.height);
      }).catch(function(){ viaImg(); });
    } else viaImg();
    function viaImg(){
      var url=URL.createObjectURL(file);
      var img=new Image();
      img.onload=function(){ draw(img, img.naturalWidth, img.naturalHeight); URL.revokeObjectURL(url); };
      img.onerror=function(){ URL.revokeObjectURL(url); reject(new Error('Ảnh không đọc được (HEIC?) — chọn ảnh JPEG.')); };
      img.src=url;
    }
  });
}

function renderPosts(ch){
  var host=document.getElementById(ch==='ig'?'igBody':'fbBody');
  var all=DATA.posts.filter(function(p){ return p.channel===ch; });
  var bc={1:0,2:0,3:0,4:0}, eo=0;
  all.forEach(function(p){ bc[postBucket(p)]++; if(editState(p)==='open') eo++; });
  var f=FILTER[ch];
  var list = !f ? all : all.filter(function(p){ return f==='editopen' ? editState(p)==='open' : (''+postBucket(p))===f.slice(1); });
  var srt=function(a,b){ var d=byTime(a,b); return SORT[ch]==='asc'?d:-d; };
  var g={1:[],2:[],3:[],4:[]}; list.forEach(function(p){ g[postBucket(p)].push(p); });
  g[1].sort(srt); g[2].sort(srt); g[3].sort(srt); g[4].sort(byTime).reverse();
  var opts=[]; [1,2,3,4].forEach(function(n){ if(bc[n]) opts.push({v:'b'+n, label:bucketLabel(n), count:bc[n]}); });
  if(eo) opts.push({v:'editopen', label:'✏️ Chờ sửa', count:eo});
  var card=(ch==='ig'?igCard:fbCard);
  var h=(ch==='fb' ? '<div class="fbintro">Facebook máy chưa đăng (app chưa Live) → <b>Gin đăng tay</b> trên Business Suite Planner. Copy caption · tải ảnh · sắp/thêm/xóa ảnh · tick "đã lên lịch".</div>' : '')
      + toolbar(ch, opts, all.length);
  h+='<div class="sech">'+bucketLabel(1)+' ('+g[1].length+')</div>';
  if(ch==='ig'){ var npd=g[1].filter(function(p){ return p.status==='pending'; }); if(npd.length>=2) h+='<button id="btnAll" onclick="approveAll()">✅ Duyệt tất cả mục chờ</button>'; }
  h+= g[1].length ? byDayCards(g[1], card) : '<div class="empty">Trống.</div>';
  h+='<div class="sech">'+bucketLabel(2)+' ('+g[2].length+')</div>';
  h+= g[2].length ? byDayCards(g[2], card) : '<div class="empty">Trống.</div>';
  h+='<div class="sech">'+bucketLabel(3)+' ('+g[3].length+')</div>';
  h+= g[3].length ? byDayCards(g[3], card) : '<div class="empty">Trống.</div>';
  h+='<div class="sech">'+bucketLabel(4)+' ('+g[4].length+')'+(g[4].length?'<button class="pubtoggle" data-pub="'+ch+'">'+(SHOW_PUB[ch]?'ẩn ▴':'hiện ▾')+'</button>':'')+'</div>';
  if(SHOW_PUB[ch]) h+= g[4].length ? byDayCards(g[4].slice(0,50), card) : '<div class="empty">Chưa có.</div>';
  host.innerHTML=h; measureCollages(); if(DETAIL) renderDetail();
}

/* ============ summary + tabs ============ */
function adsSummary(A){
  if(!A.length) return 'chưa có';
  var c={}; A.forEach(function(a){ c[a.status]=(c[a.status]||0)+1; });
  var parts=[];
  if(c.pending) parts.push(c.pending+' chờ duyệt');
  if(c.needs_edit) parts.push(c.needs_edit+' chờ sửa');
  if(c.created_paused) parts.push(c.created_paused+' nháp tắt');
  if(c.activated_by_owner) parts.push(c.activated_by_owner+' đang chạy');
  if(c.approved) parts.push(c.approved+' đã duyệt');
  if(!parts.length) parts.push(A.length+' mục');
  return parts.join(' · ');
}

function wireBody(host){
  host.addEventListener('click', function(e){
    if(SWALLOW_CLICK){ SWALLOW_CLICK=false; e.preventDefault(); e.stopPropagation(); return; }
    var el;
    if((el=e.target.closest('[data-dl]'))){ dl(el.getAttribute('data-dl')); return; }
    if((el=e.target.closest('[data-mv]'))){ moveMedia(+el.getAttribute('data-pid'), +el.getAttribute('data-i'), el.getAttribute('data-mv')==='up'?-1:1); return; }
    if((el=e.target.closest('[data-del]'))){ deletePhoto(+el.getAttribute('data-del'), +el.getAttribute('data-i')); return; }
    if((el=e.target.closest('[data-add]'))){ startAdd(+el.getAttribute('data-add')); return; }
    if((el=e.target.closest('[data-undo]'))){ doUndo(+el.getAttribute('data-undo')); return; }
    if((el=e.target.closest('[data-pub]'))){ togglePub(el.getAttribute('data-pub')); return; }
    if((el=e.target.closest('[data-donesec]'))){ toggleDone(el.getAttribute('data-donesec')); return; }
    if((el=e.target.closest('[data-sort]'))){ toggleSort(el.getAttribute('data-sort')); return; }
    if((el=e.target.closest('[data-open]'))){ var op=el.getAttribute('data-open').split(':'); openDetail(op[0], +op[1]); return; }
    if((el=e.target.closest('[data-copy]'))){ var p=post(el.getAttribute('data-pid')); if(!p) return;
      copyText(el.getAttribute('data-copy')==='cap' ? (p.caption||'') : (p.first_comment_text||''), el); return; }
    if((el=e.target.closest('[data-lb]'))){ openLB(el.getAttribute('data-lb'), +el.getAttribute('data-lbi')); return; }
  });
  host.addEventListener('change', function(e){
    var sel=e.target.closest('select[data-filter]');
    if(sel){ var fch=sel.getAttribute('data-filter'); FILTER[fch]=sel.value; reRenderCol(fch); return; }
    var cb=e.target.closest('[data-done]'); if(!cb) return;
    var id=+cb.getAttribute('data-done'); var val=cb.checked; var p=post(id);
    if(p) p.owner_scheduled=val;                          // đổi tức thì (optimistic)
    renderFB(); renderSummary();
    api({action:'set_scheduled', ids:[id], value:val}).then(function(j){
      if(j.error){ if(p) p.owner_scheduled=!val; renderFB(); renderSummary(); alert('Lỗi lưu lịch: '+(j.error||'')); }
    });
  });
  host.addEventListener('dragstart', function(e){ var pim=e.target.closest('.pimg[draggable=true]'); if(!pim) return;
    DRAG={pid:+pim.getAttribute('data-pid'), i:+pim.getAttribute('data-i')}; e.dataTransfer.effectAllowed='move'; pim.classList.add('drag'); });
  host.addEventListener('dragend', function(e){ var pim=e.target.closest('.pimg'); if(pim) pim.classList.remove('drag'); DRAG=null; });
  host.addEventListener('dragover', function(e){ if(e.target.closest('.pimg')) e.preventDefault(); });
  host.addEventListener('drop', function(e){ var tgt=e.target.closest('.pimg'); if(!tgt||!DRAG) return; e.preventDefault();
    if(+tgt.getAttribute('data-pid')!==DRAG.pid){ DRAG=null; return; }   // chỉ đổi trong cùng 1 bài
    var to=+tgt.getAttribute('data-i'), from=DRAG.i, pid=DRAG.pid; DRAG=null;
    if(to===from) return;
    var p=post(pid); if(!p) return; var arr=(p.media||[]).slice();
    var mv=arr.splice(from,1)[0]; arr.splice(to,0,mv);
    applyMedia(pid, arr); });

  /* KÉO–THẢ CẢM ỨNG (điện thoại): chạm-giữ 1 ảnh ~0,2s để "nhấc" → kéo sang ảnh khác → thả = đổi vị trí.
     (draggable ở trên chỉ chạy chuột máy tính; iOS/Android cần tự xử touch.) */
  var TDRAG=null;
  function tEnd(commit){
    if(!TDRAG) return;
    clearTimeout(TDRAG.timer);
    if(TDRAG.el) TDRAG.el.classList.remove('drag');
    if(TDRAG.over) TDRAG.over.classList.remove('dragover');
    if(TDRAG.active){ SWALLOW_CLICK=true; setTimeout(function(){ SWALLOW_CLICK=false; },350); }  // chặn lightbox mở sau khi kéo
    var d=TDRAG; TDRAG=null;
    if(commit && d.active && d.to!=null && d.to!==d.from){
      var p=post(d.pid); if(!p) return; var arr=(p.media||[]).slice();
      var mv=arr.splice(d.from,1)[0]; arr.splice(d.to,0,mv); applyMedia(d.pid, arr);
    }
  }
  host.addEventListener('touchstart', function(e){
    if(e.touches.length!==1) return;
    var pim=e.target.closest('.pimg[draggable=true]'); if(!pim) return;
    if(e.target.closest('button')) return;          // chạm nút ◀▶⬇🗑 thì đừng kéo
    var t=e.touches[0];
    TDRAG={pid:+pim.getAttribute('data-pid'), from:+pim.getAttribute('data-i'), el:pim, x:t.clientX, y:t.clientY, active:false, to:null, over:null};
    TDRAG.timer=setTimeout(function(){ if(TDRAG){ TDRAG.active=true; pim.classList.add('drag'); if(navigator.vibrate) navigator.vibrate(15); } }, 220);
  }, {passive:true});
  host.addEventListener('touchmove', function(e){
    if(!TDRAG) return;
    var t=e.touches[0];
    if(!TDRAG.active){                               // chưa "nhấc" mà đã trượt = cuộn trang → hủy kéo
      if(Math.abs(t.clientX-TDRAG.x)>10 || Math.abs(t.clientY-TDRAG.y)>10){ clearTimeout(TDRAG.timer); TDRAG=null; }
      return;
    }
    e.preventDefault();                              // đang kéo → chặn cuộn
    var over=document.elementFromPoint(t.clientX, t.clientY);
    var tp=over&&over.closest?over.closest('.pimg'):null;
    if(TDRAG.over && TDRAG.over!==tp){ TDRAG.over.classList.remove('dragover'); TDRAG.over=null; }
    if(tp && tp!==TDRAG.el && +tp.getAttribute('data-pid')===TDRAG.pid){
      TDRAG.to=+tp.getAttribute('data-i'); TDRAG.over=tp; tp.classList.add('dragover');
    } else { TDRAG.to=null; }
  }, {passive:false});
  host.addEventListener('touchend', function(){ tEnd(true); });
  host.addEventListener('touchcancel', function(){ tEnd(false); });
}

/* DI TRÚ 1 LẦN: đẩy tick "đã lên lịch" FB cũ (localStorage máy NÀY) lên DB → union, KHÔNG xóa cái đã có.
   Chạy trên đúng máy Gin đang giữ tick → tick được bảo toàn, các máy khác đồng bộ theo. */
function migrateFbDone(){
  try{
    if(localStorage.getItem('enm-fb-done-migrated')) return;
    var old=load('enm-fb-done');
    var ids=Object.keys(old).filter(function(k){ return old[k]; }).map(Number).filter(Boolean);
    var need=ids.filter(function(id){ var p=post(id); return p && p.channel==='fb' && !p.owner_scheduled; });
    if(!need.length){ localStorage.setItem('enm-fb-done-migrated','1'); return; }
    api({action:'set_scheduled', ids:need, value:true}).then(function(j){
      if(j && !j.error){ localStorage.setItem('enm-fb-done-migrated','1'); refresh(); }
    });
  }catch(e){}
}

/* ---- refresh ---- */
function refresh(){
  api({action:'list'}).then(function(j){
    if(j._s===401){ document.getElementById('gerr').textContent='PIN sai.'; sessionStorage.removeItem('enm_pin'); return; }
    if(j._s===429){ document.getElementById('gerr').textContent='Sai nhiều lần — khóa 15 phút.'; return; }
    if(j.error){ alert(j.error); return; }
    sessionStorage.setItem('enm_pin', PIN);
    document.getElementById('gate').hidden=true; document.getElementById('app').hidden=false;
    DATA={posts:j.posts||[], ads:j.ads||[], now:j.now};
    LBSETS={};
    renderSummary(); renderIG(); renderFB(); renderAds();
    migrateFbDone();
  });
}

document.getElementById('pin').addEventListener('keydown', function(e){ if(e.key==='Enter') enter(); });
wireBody(document.getElementById('igBody'));
wireBody(document.getElementById('fbBody'));
wireBody(document.getElementById('adsBody'));   // để nút ẩn/hiện (data-donesec) + lightbox ảnh Ads hoạt động
wireBody(document.getElementById('detailBody')); // popup: mọi tương tác (sửa ảnh/copy/tick/duyệt/lightbox) chạy trong modal
document.addEventListener('keydown', function(e){ if(e.key!=='Escape') return;
  if(document.getElementById('lb').classList.contains('on')) closeLB();
  else if(DETAIL) closeDetail(); });
if(PIN) refresh();
setInterval(function(){
  if(document.getElementById('app').hidden) return;
  for(var k in SAVING){ if(SAVING[k]) return; }   // đang lưu ảnh → đừng tải đè
  if(REQEDIT) return;                              // đang gõ yêu cầu sửa → đừng tải đè (mất chữ)
  refresh();
}, 60000);
</script>
